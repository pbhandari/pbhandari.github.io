name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and fetch resume
        env:
          GH_TOKEN: ${{ secrets.RESUME_REPO_TOKEN }}
        run: |
          # Record the most recent run ID before triggering so we can
          # identify the new run unambiguously below.
          PREV_RUN_ID=$(gh run list \
            --repo pbhandari/resume \
            --workflow build.yaml \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId // ""')

          # Trigger the build workflow in the private resume repo
          gh workflow run build.yaml --repo pbhandari/resume

          # Poll until a new run appears (up to ~2 minutes)
          RUN_ID=""
          for i in $(seq 1 24); do
            sleep 5
            RUN_ID=$(gh run list \
              --repo pbhandari/resume \
              --workflow build.yaml \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId')
            if [ -n "$RUN_ID" ] && [ "$RUN_ID" != "$PREV_RUN_ID" ]; then
              break
            fi
            RUN_ID=""
          done

          if [ -z "$RUN_ID" ]; then
            echo "Timed out waiting for the resume workflow run to start."
            exit 1
          fi

          # Wait for the run to finish (exits non-zero if the run fails)
          gh run watch "$RUN_ID" --repo pbhandari/resume --exit-status

          # Download all artifacts produced by the run
          gh run download "$RUN_ID" --repo pbhandari/resume --dir resume-artifacts

          # Copy resume.pdf to the website root so it is served at <url>/resume.pdf
          find resume-artifacts -name 'resume.pdf' -exec cp {} ./resume.pdf \;

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./

  deploy:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
