name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger resume build and wait for completion
        id: resume-build
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.RESUME_REPO_TOKEN }}
          script: |
            const owner = 'pbhandari';
            const repo = 'resume';
            const workflow_id = 'build.yaml';
            const ref = 'main';

            // Record time before triggering to identify the new run unambiguously
            const triggerTime = new Date().toISOString();

            await github.rest.actions.createWorkflowDispatch({
              owner, repo, workflow_id, ref,
            });

            // Poll until the new run appears (up to ~2 min)
            let runId;
            for (let i = 0; i < 24; i++) {
              await new Promise(r => setTimeout(r, 5000));
              const { data: { workflow_runs } } = await github.rest.actions.listWorkflowRuns({
                owner, repo, workflow_id,
                created: `>=${triggerTime}`,
                per_page: 1,
              });
              if (workflow_runs.length > 0) {
                runId = workflow_runs[0].id;
                break;
              }
            }
            if (!runId) {
              throw new Error('Timed out waiting for resume workflow run to start');
            }

            // Poll until the run completes (up to ~5 min)
            let conclusion;
            for (let i = 0; i < 60; i++) {
              await new Promise(r => setTimeout(r, 5000));
              const { data: run } = await github.rest.actions.getWorkflowRun({
                owner, repo, run_id: runId,
              });
              if (run.status === 'completed') {
                conclusion = run.conclusion;
                break;
              }
            }
            if (conclusion !== 'success') {
              throw new Error(`Resume workflow run finished with conclusion: ${conclusion}`);
            }

            core.setOutput('run-id', String(runId));

      - name: Download resume artifacts
        env:
          GH_TOKEN: ${{ secrets.RESUME_REPO_TOKEN }}
        run: |
          gh run download "${{ steps.resume-build.outputs.run-id }}" \
            --repo pbhandari/resume \
            --dir resume-artifacts

      - name: Copy resume PDF to site root
        run: |
          find resume-artifacts -name 'resume.pdf' -exec cp {} ./resume.pdf \;
          if [ ! -f ./resume.pdf ]; then
            echo "Error: resume.pdf not found in downloaded artifacts"
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./

  deploy:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
