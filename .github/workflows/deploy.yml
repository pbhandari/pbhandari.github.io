name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-resume:
    uses: pbhandari/resume/.github/workflows/build.yml@main
    permissions:
      contents: read
    secrets: inherit

  build:
    needs: build-resume
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download resume PDF
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: resume-artifacts

      - name: Copy resume PDF to site root
        run: |
          find resume-artifacts -name 'resume.pdf' -exec cp {} ./resume.pdf \;
          if [ ! -f ./resume.pdf ]; then
            echo "Error: resume.pdf not found in downloaded artifacts"
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./

  deploy:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
